apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phpldapadmin-ingress
  namespace: corp-local
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    # Separate hostname keeps LDAP admin UI completely independent from the React portal.
    # Add "127.0.0.1 ldapadmin.corp.localhost" to /etc/hosts to resolve this.
    - host: ldapadmin.corp.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phpldapadmin
                port:
                  number: 80
