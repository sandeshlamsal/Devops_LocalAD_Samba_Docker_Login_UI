apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phpldapadmin-ingress
  namespace: corp-local
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Strip /ldapadmin prefix before forwarding to the container (which serves at /)
    traefik.ingress.kubernetes.io/router.middlewares: corp-local-strip-ldapadmin@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: corp.localhost
      http:
        paths:
          - path: /ldapadmin
            pathType: Prefix
            backend:
              service:
                name: phpldapadmin
                port:
                  number: 80
