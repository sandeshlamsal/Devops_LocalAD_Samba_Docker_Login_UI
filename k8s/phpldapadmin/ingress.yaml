apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phpldapadmin-ingress
  namespace: corp-local
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # No stripPrefix needed — PHPLDAPADMIN_SERVER_PATH=/ldapadmin makes the app generate
    # all asset URLs with /ldapadmin/ prefix, so Traefik forwards the path as-is.
spec:
  ingressClassName: traefik
  rules:
    - host: corp.localhost
      http:
        paths:
          - path: /ldapadmin
            pathType: Prefix
            backend:
              service:
                name: phpldapadmin
                port:
                  number: 80
