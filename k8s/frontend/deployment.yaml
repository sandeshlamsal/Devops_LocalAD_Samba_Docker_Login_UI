apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: corp-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Built with --build-arg VITE_API_URL=http://corp.localhost
          # so API calls from the browser hit Traefik → backend
          image: corp-frontend:k8s
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
