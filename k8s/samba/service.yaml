apiVersion: v1
kind: Service
metadata:
  name: samba
  namespace: corp-local
spec:
  selector:
    app: samba
  # ClusterIP — only reachable inside the cluster (backend → samba)
  type: ClusterIP
  ports:
    - name: ldap
      port: 389
      targetPort: 389
    - name: ldaps
      port: 636
      targetPort: 636
    - name: kerberos
      port: 88
      targetPort: 88
