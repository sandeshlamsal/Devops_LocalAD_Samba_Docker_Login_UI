apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: corp-local
type: Opaque
# Values are base64-encoded. To encode: echo -n "your-value" | base64
# Admin@Corp#1234  → QWRtaW5AQ29ycCMxMjM0
# change-me-in-production → Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24=
stringData:
  LDAP_ADMIN_PASS: "Admin@Corp#1234"
  JWT_SECRET: "change-me-in-production-use-a-long-random-string"
